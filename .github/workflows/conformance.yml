name: RFC 6716 / 8251 conformation

on:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    name: test / RFC 6716 / 8251 conformation
    runs-on: ubuntu-latest
    timeout-minutes: 65
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26" # auto-update/latest-go-version
          cache: true

      - name: Run conformance test
        continue-on-error: true
        timeout-minutes: 60
        env:
          OPUS_CONFORMANCE_RESULT: ${{ runner.temp }}/opus-rfc-conformance.md
        run: bash .github/scripts/run-rfc6716-conformance.sh

      - name: Post conformance result
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        continue-on-error: true
        env:
          RESULT_FILE: ${{ runner.temp }}/opus-rfc-conformance.md
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- opus-rfc-conformance -->';
            const legacyMarker = '<!-- opus-rfc6716-conformance -->';
            const resultFile = process.env.RESULT_FILE;
            const body = fs.existsSync(resultFile)
              ? fs.readFileSync(resultFile, 'utf8')
              : `${marker}\n## RFC 6716 / 8251 conformation\n\n**Status:** fail\n\nThe conformance action did not produce a result file.`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' &&
                comment.body &&
                (comment.body.includes(marker) || comment.body.includes(legacyMarker))
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
